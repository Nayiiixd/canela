{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ accion }} — Cinnarolls</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'appcanela/css/mystyle.css' %}">
    <style>
        body { background: var(--cream); }
        .top-bar { padding: 16px 0; border-bottom: 1px solid var(--warm-tan); background: #fff; }
        .top-bar a { color: var(--cinnamon); text-decoration: none; font-weight: 700; }
        .form-producto-wrap { max-width: 560px; margin: 0 auto; padding: 36px 0 64px; }
        .form-card { background: #fff; border: 1px solid #f0dfd0; border-radius: 24px; padding: 32px; box-shadow: 0 12px 32px rgba(59,31,16,.06); }
        .form-card h1 { font-family: 'Playfair Display', serif; color: var(--espresso); font-size: 1.8rem; margin-bottom: 4px; }
        .form-eyebrow { font-size: .72rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--cinnamon); margin-bottom: 4px; }
        .form-card .form-label { font-weight: 700; color: var(--espresso); margin-bottom: 6px; }
        .preview-img { width: 90px; height: 90px; object-fit: cover; border-radius: 14px; border: 1px solid #f0dfd0; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container d-flex align-items-center justify-content-between">
            <a class="nav-brand" href="{% url 'index' %}">
                <img src="{% static 'appcanela/img/logo.png' %}" alt="Logo" style="width:36px;height:36px;object-fit:contain"> Cinnarolls
            </a>
            <a href="{% url 'panel_admin' %}"><i class="bi bi-arrow-left"></i> Volver al panel</a>
        </div>
    </div>

    <div class="form-producto-wrap">
        <div class="container">
            <div class="form-card">
                <p class="form-eyebrow"><i class="bi bi-box-seam me-1"></i> Gestión de productos</p>
                <h1>{{ accion }}</h1>

                <form method="post" enctype="multipart/form-data" class="mt-4">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" required value="{{ producto.nombre|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select name="categoria" class="form-select" required>
                            {% for valor, etiqueta in categorias %}
                            <option value="{{ valor }}" {% if producto.categoria == valor %}selected{% endif %}>{{ etiqueta }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio (CLP)</label>
                        <input type="number" name="precio" class="form-control" min="0" required value="{{ producto.precio|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <select name="estado" class="form-select">
                            <option value="activo" {% if producto.disponible or not producto %}selected{% endif %}>Activo (se muestra en el menú)</option>
                            <option value="inactivo" {% if producto and not producto.disponible %}selected{% endif %}>Inactivo (oculto)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción <span style="font-weight:400;color:var(--text-mid)">(opcional)</span></label>
                        <textarea name="descripcion" class="form-control" rows="2">{{ producto.descripcion|default:'' }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Foto del producto</label>
                        {% if producto.imagen %}
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <img src="{{ producto.imagen.url }}" class="preview-img" alt="Foto actual">
                            <small class="text-muted">Foto actual — subí una nueva para reemplazarla.</small>
                        </div>
                        {% endif %}
                        <input type="file" name="imagen" class="form-control" accept="image/*">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn-cinnamon justify-content-center flex-grow-1">
                            <i class="bi bi-check-lg"></i> Guardar
                        </button>
                        <a href="{% url 'panel_admin' %}" class="btn btn-outline-secondary rounded-pill px-4 d-flex align-items-center">Cancelar</a>
                    </div>
                </form>

                {% if producto %}
                <form method="post" action="{% url 'producto_eliminar' producto.id %}" class="mt-3"
                      onsubmit="return confirm('¿Eliminar este producto? Esta acción no se puede deshacer.');">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link text-danger p-0" style="text-decoration:none;font-weight:700;">
                        <i class="bi bi-trash"></i> Eliminar producto
                    </button>
                </form>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
