{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado — Cinnarolls</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'appcanela/css/mystyle.css' %}">
</head>
<body>
    <div class="confirmacion-hero">
        <div class="container" style="max-width:560px">
            <div class="confirmacion-icono">
                <i class="bi bi-check-lg"></i>
            </div>
            <h1>¡Gracias por tu pedido!</h1>
            <p>Hemos recibido tu pedido correctamente. Pronto estará listo.</p>
        </div>
    </div>

    <div class="container py-5" style="max-width:560px">
        <div class="d-grid">
            <a href="{% url 'index' %}" class="btn-cinnamon justify-content-center">
                <i class="bi bi-house-heart-fill"></i> Volver al inicio
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // El pedido ya se proceso y guardo en la BD: vaciamos el carrito del navegador
        // para que no queden los productos al volver al menu o al carrito.
        localStorage.removeItem('cart');
    </script>
</body>
</html>
